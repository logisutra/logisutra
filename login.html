<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | LogiSutra Console</title>
    <style>
        :root {
            --primary: #1e40af;
            --primary-hover: #1d4ed8;
            --secondary: #10b981;
            --dark: #0f172a;
            --slate: #475569;
            --light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #f8fafc; padding: 20px; }

        .login-container { background: #1e293b; border: 1px solid #334155; width: 100%; max-width: 420px; border-radius: 12px; padding: 40px 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        
        .logo { font-size: 28px; font-weight: 800; color: white; letter-spacing: -0.05em; text-decoration: none; display: inline-block; margin-bottom: 8px; }
        .logo span { color: var(--secondary); }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }

        form { text-align: left; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px 16px; border-radius: 6px; color: white; font-size: 15px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--secondary); }

        .btn-submit { width: 100%; background: var(--secondary); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-submit:hover { background: #059669; }

        /* Loading Spinner */
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-home { display: inline-block; margin-top: 25px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .back-home:hover { color: white; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="logo">Logi<span>Sutra</span></a>
        <div class="subtitle">Global Trade Operations Gateway</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Security ID / Email</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            
            <div class="form-group">
                <label for="password">Security Access Key</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Authenticate Console</span>
            </button>
        </form>

        <a href="index.html" class="back-home">← Back to Home Page</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents the default page refresh
            
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');

            // 1. Show simulated loading status
            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.opacity = '0.8';
            spinner.style.display = 'block';
            btnText.textContent = 'Verifying Credentials...';

            // 2. Simulate 1.5 seconds authentication process, then redirect
            setTimeout(() => {
                // Change "index.html" below to whatever page you want logged-in users to see!
                window.location.href = 'index.html'; 
            }, 1500);
        });
    </script>
    <script>
        // This is the engine that makes your login form work!
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault(); // Stops the page from just refreshing
            
            // Redirects the user straight to your new homepage
            window.location.href = 'index.html'; 
        });
    </script>
    
</body>
</html>
